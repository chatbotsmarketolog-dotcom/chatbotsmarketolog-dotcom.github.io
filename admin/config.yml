backend:
  name: github
  repo: chatbotsmarketolog-dotcom/Chatbot-and-AI-Agent-Studio
  branch: main
  auth_endpoint: oauth
  client_id: Ov23liMNKPrvdqhLkAqK
  client_secret: c481cbd56a5adae0998360cb8824cdd658b10683

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "site"
    label: "📄 Сайт КРИСТИНА.AI"
    editor:
      preview: false
    files:
      - name: "site-config"
        file: "content/site.json"
        label: " Главная страница"
        fields:
          # === SEO ===
          - label: "🔍 SEO настройки"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
                default: "Кристина — Эксперт по автономным брендам | AI-агенты и чат-боты"
              - label: "Description"
                name: "description"
                widget: "text"
                default: "Создаю чат-ботов и AI-агентов, которые работают вместо вас 24/7."

          # === HEADER ===
          - label: " Header"
            name: "header"
            widget: "object"
            collapsed: false
            fields:
              - label: "Логотип"
                name: "logo"
                widget: "string"
                default: "КРИСТИНА.AI"
              - label: "Пункты меню"
                name: "menu"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - label: "Название"
                    name: "label"
                    widget: "string"
                  - label: "Ссылка"
                    name: "href"
                    widget: "string"

          # === HERO ===
          - label: "🎯 Hero Section"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - label: "Надзаголовок"
                name: "eyebrow"
                widget: "string"
                default: "🤖 AI-агенты и автономные бренды — 2122"
              - label: "Заголовок H1"
                name: "title"
                widget: "string"
                default: "Ваш бренд будет работать самостоятельно"
              - label: "Описание"
                name: "description"
                widget: "markdown"
                default: "Создаю чат-ботов и AI-агентов, которые работают вместо вас 24/7, говорят вашим голосом и закрывают вопросы без вашего участия. Добро пожаловать в будущее."
              - label: "Кнопка 1 текст"
                name: "btn1_text"
                widget: "string"
                default: "🚀 Оставить заявку"
              - label: "Кнопка 1 ссылка"
                name: "btn1_link"
                widget: "string"
                default: "#applications"
              - label: "Кнопка 2 текст"
                name: "btn2_text"
                widget: "string"
                default: "Узнать больше →"
              - label: "Кнопка 2 ссылка"
                name: "btn2_link"
                widget: "string"
                default: "#services"
              - label: "Триггеры"
                name: "triggers"
                widget: "string"
                default: "✅ Работает 24/7, ✅ Интеграция с Telegram/VK, ✅ Гарантия окупаемости"

          # === ABOUT ===
          - label: "👤 Обо мне"
            name: "about"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
                default: "Кто я?"
              - label: "Текст 1"
                name: "text1"
                widget: "markdown"
                default: "Я — Кристина, эксперт по автономным брендам. Помогаю экспертам, предпринимателям и онлайн-проектам выйти из рутины через технологии и цифровую эстетику."
              - label: "Текст 2"
                name: "text2"
                widget: "markdown"
                default: "Я создаю чат-ботов и AI-агентов, которые работают вместо вас 24/7. Мой козырь — маркетинговое мышление и опыт в продажах."
              - label: "Статистика"
                name: "stats"
                widget: "list"
                summary: "{{fields.number}} {{fields.text}}"
                fields:
                  - label: "Число"
                    name: "number"
                    widget: "string"
                  - label: "Текст"
                    name: "text"
                    widget: "string"
              - label: "Цитата"
                name: "quote"
                widget: "markdown"
                default: "«AI-агент — это вы в автономном режиме. Он должен чувствовать вашу энергию, а не просто выдавать текст.»"
              - label: "Telegram"
                name: "telegram"
                widget: "string"
                default: "https://t.me/marketologdizayner"
              - label: "VK"
                name: "vk"
                widget: "string"
                default: "https://vk.ru/kristinavcifre"

          # === SERVICES ===
          - label: "️ Услуги"
            name: "services"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
                default: "Что мы создаём"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
                default: "Два направления, которые трансформируют ваш бизнес в автономную систему"
              - label: "Карточки"
                name: "cards"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - label: "Иконка"
                    name: "icon"
                    widget: "string"
                  - label: "Название"
                    name: "title"
                    widget: "string"
                  - label: "Описание"
                    name: "description"
                    widget: "markdown"
                  - label: "Цена"
                    name: "price"
                    widget: "string"
                  - label: "Кнопка"
                    name: "btn_text"
                    widget: "string"

          # === PRICING ===
          - label: "💰 Тарифы"
            name: "pricing"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
                default: "Стоимость"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
                default: "Прозрачные тарифы для каждого уровня задач"
              - label: "Карточки"
                name: "cards"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - label: "Иконка"
                    name: "icon"
                    widget: "string"
                  - label: "Название"
                    name: "name"
                    widget: "string"
                  - label: "Подзаголовок"
                    name: "subtitle"
                    widget: "string"
                  - label: "Цена"
                    name: "price"
                    widget: "string"
                  - label: "Популярный"
                    name: "popular"
                    widget: "boolean"
                    default: false
                  - label: "Возможности"
                    name: "features"
                    widget: "list"
                    summary: "{{fields.item}}"
                    fields:
                      - label: "Пункт"
                        name: "item"
                        widget: "string"
                  - label: "Кнопка"
                    name: "btn_text"
                    widget: "string"

          # === TESTIMONIALS ===
          - label: "⭐ Отзывы"
            name: "testimonials"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
                default: "Отзывы клиентов"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
                default: "Что говорят те, кто уже работает с AI-агентами"
              - label: "Карточки"
                name: "cards"
                widget: "list"
                summary: "{{fields.author}}"
                fields:
                  - label: "Автор"
                    name: "author"
                    widget: "string"
                  - label: "Профессия"
                    name: "role"
                    widget: "string"
                  - label: "Текст"
                    name: "text"
                    widget: "markdown"
                  - label: "Рейтинг"
                    name: "rating"
                    widget: "number"
                    default: 5
                    min: 1
                    max: 5
              - label: "Ссылка на бота"
                name: "bot_link"
                widget: "string"
                default: "https://t.me/otziyv_chatbota_kristina_bot"

          # === CONTACTS ===
          - label: "📞 Контакты"
            name: "contacts"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
                default: "Контакты"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
                default: "Свяжитесь со мной любым удобным способом"
              - label: "Telegram"
                name: "telegram"
                widget: "string"
                default: "@marketologdizayner"
              - label: "VK"
                name: "vk"
                widget: "string"
                default: "@kristinavcifre"
              - label: "Instagram"
                name: "instagram"
                widget: "string"
                default: "@gap_____ova_kristina"
              - label: "Режим работы"
                name: "hours"
                widget: "string"
                default: "Пн–Пт: 10:00–19:00 (МСК)"
              - label: "AI статус"
                name: "ai_status"
                widget: "string"
                default: "AI-агенты работают 24/7 🤖"
              - label: "Финальный текст"
                name: "final_text"
                widget: "markdown"
                default: "Если вы готовы выйти из операционки и построить бренд, который работает сам — пишите."

          # === APPLICATIONS ===
          - label: "🚀 Блок заявки"
            name: "applications"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
                default: "Оставить заявку"
              - label: "Описание"
                name: "description"
                widget: "markdown"
                default: "Общайтесь с AI-агентом Кристины — он соберёт заявку за вас"
              - label: "Название виджета"
                name: "widget_name"
                widget: "string"
                default: "AI-агент Кристины"
              - label: "Подпись"
                name: "widget_subtitle"
                widget: "string"
                default: "Цифровой двойник"

          # === FOOTER ===
          - label: "🔻 Footer"
            name: "footer"
            widget: "object"
            collapsed: false
            fields:
              - label: "Логотип"
                name: "logo"
                widget: "string"
                default: "КРИСТИНА.AI"
              - label: "Telegram ссылка"
                name: "telegram_link"
                widget: "string"
                default: "https://t.me/marketologdizayner"
              - label: "VK ссылка"
                name: "vk_link"
                widget: "string"
                default: "https://vk.ru/kristinavcifre"
              - label: "Instagram ссылка"
                name: "instagram_link"
                widget: "string"
                default: "https://www.instagram.com/gap_____ova_kristina/"
              - label: "Копирайт"
                name: "copyright"
                widget: "string"
                default: "© 2025 КРИСТИНА.AI — Оазис будущего"

          # === CUSTOM CODE ===
          - label: "💻 Кастомный код"
            name: "custom_code"
            widget: "object"
            collapsed: true
            hint: "Вставляй скрипты как на Тильде"
            fields:
              - label: "Код в <head>"
                name: "head_code"
                widget: "code"
                default_language: "html"
                output_code_only: false
              - label: "Код перед </body>"
                name: "footer_code"
                widget: "code"
                default_language: "javascript"
                output_code_only: false
