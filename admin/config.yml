backend:
  name: github
  repo: chatbotsmarketolog-dotcom/Chatbot-and-AI-Agent-Studio
  branch: main
  auth_endpoint: oauth
  client_id: Ov23liMNKPrvdqhLkAqK
  client_secret: c481cbd56a5adae0998360cb8824cdd658b10683

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "site"
    label: "📄 Сайт КРИСТИНА.AI"
    editor:
      preview: false
    files:
      - name: "site-config"
        file: "content/site.json"
        label: "📄 Главная страница"
        fields:
          # === SEO ===
          - label: "🔍 SEO настройки"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - label: "Title (заголовок вкладки)"
                name: "title"
                widget: "string"
                default: "Кристина — Эксперт по автономным брендам | AI-агенты и чат-боты"
              - label: "Description (описание для поисковиков)"
                name: "description"
                widget: "text"
                default: "Создаю чат-ботов и AI-агентов, которые работают вместо вас 24/7. Автономные бренды будущего."
              - label: "Keywords (ключевые слова)"
                name: "keywords"
                widget: "string"
                default: "чат-бот, AI-агент, автоматизация, телеграм-бот, маркетинг, сайт на коде"

          # === HEADER ===
          - label: "🔝 Шапка сайта (Header)"
            name: "header"
            widget: "object"
            collapsed: false
            fields:
              - label: "Логотип"
                name: "logo"
                widget: "string"
                default: "КРИСТИНА.AI"
              - label: "Пункты меню"
                name: "menu"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - label: "Название"
                    name: "label"
                    widget: "string"
                    required: true
                  - label: "Ссылка (якорь)"
                    name: "href"
                    widget: "string"
                    required: true
                    hint: "Например: #hero, #about, #services"

          # === HERO SECTION ===
          - label: "🎯 Hero (Главный экран)"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - label: "Надзаголовок"
                name: "eyebrow"
                widget: "string"
                default: "🤖 AI-агенты и автономные бренды — 2122"
              - label: "Заголовок H1"
                name: "title"
                widget: "string"
                default: "Ваш бренд будет работать самостоятельно"
              - label: "Описание"
                name: "description"
                widget: "markdown"
                default: "Создаю чат-ботов и AI-агентов, которые работают вместо вас 24/7, говорят вашим голосом и закрывают вопросы без вашего участия. Добро пожаловать в будущее."
              - label: "Текст кнопки 1"
                name: "btn1_text"
                widget: "string"
                default: "🚀 Оставить заявку"
              - label: "Ссылка кнопки 1"
                name: "btn1_link"
                widget: "string"
                default: "#applications"
              - label: "Текст кнопки 2"
                name: "btn2_text"
                widget: "string"
                default: "Узнать больше →"
              - label: "Ссылка кнопки 2"
                name: "btn2_link"
                widget: "string"
                default: "#services"
              - label: "Триггеры (через запятую)"
                name: "triggers"
                widget: "string"
                default: "✅ Работает 24/7, ✅ Интеграция с Telegram/VK, ✅ Гарантия окупаемости"

          # === ABOUT SECTION ===
          - label: "👤 Обо мне"
            name: "about"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
                default: "Кто я?"
              - label: "Текст 1"
                name: "text1"
                widget: "markdown"
                default: "Я — Кристина, эксперт по автономным брендам. Помогаю экспертам, предпринимателям и онлайн-проектам выйти из рутины через технологии и цифровую эстетику."
              - label: "Текст 2"
                name: "text2"
                widget: "markdown"
                default: "Я создаю чат-ботов и AI-агентов, которые работают вместо вас 24/7. Мой козырь — маркетинговое мышление и опыт в продажах. Я создаю системы, которые привлекают, вовлекают и строят доверие."
              - label: "Статистика"
                name: "stats"
                widget: "list"
                summary: "{{fields.number}} {{fields.text}}"
                fields:
                  - label: "Число"
                    name: "number"
                    widget: "string"
                    default: "6"
                  - label: "Подпись"
                    name: "text"
                    widget: "string"
                    default: "лет в маркетинге"
              - label: "Имя"
                name: "name"
                widget: "string"
                default: "Кристина"
              - label: "Должность"
                name: "role"
                widget: "string"
                default: "Эксперт по автономным брендам"
              - label: "Цитата"
                name: "quote"
                widget: "markdown"
                default: "«AI-агент — это вы в автономном режиме. Он должен чувствовать вашу энергию, а не просто выдавать текст.»"
              - label: "Telegram ссылка"
                name: "telegram"
                widget: "string"
                default: "https://t.me/marketologdizayner"
              - label: "VK ссылка"
                name: "vk"
                widget: "string"
                default: "https://vk.ru/kristinavcifre"

          # === SERVICES SECTION ===
          - label: "⚙️ Услуги"
            name: "services"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
                default: "Что мы создаём"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
                default: "Два направления, которые трансформируют ваш бизнес в автономную систему"
              - label: "Карточки услуг"
                name: "cards"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - label: "Иконка (эмодзи)"
                    name: "icon"
                    widget: "string"
                    default: "🤖"
                  - label: "Название"
                    name: "title"
                    widget: "string"
                    required: true
                  - label: "Описание"
                    name: "description"
                    widget: "markdown"
                  - label: "Цена"
                    name: "price"
                    widget: "string"
                  - label: "Текст кнопки"
                    name: "btn_text"
                    widget: "string"
                    default: "✨ Записаться на консультацию"

          # === PRICING SECTION ===
          - label: "💰 Тарифы"
            name: "pricing"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
                default: "Стоимость"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
                default: "Прозрачные тарифы для каждого уровня задач"
              - label: "Карточки тарифов"
                name: "cards"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - label: "Иконка"
                    name: "icon"
                    widget: "string"
                    default: "🤖"
                  - label: "Название"
                    name: "name"
                    widget: "string"
                    required: true
                  - label: "Подзаголовок"
                    name: "subtitle"
                    widget: "string"
                  - label: "Цена"
                    name: "price"
                    widget: "string"
                    required: true
                  - label: "Популярный (выделить)"
                    name: "popular"
                    widget: "boolean"
                    default: false
                  - label: "Список возможностей"
                    name: "features"
                    widget: "list"
                    summary: "{{fields.item}}"
                    fields:
                      - label: "Пункт"
                        name: "item"
                        widget: "string"
                  - label: "Текст кнопки"
                    name: "btn_text"
                    widget: "string"
                    default: "Выбрать"

          # === TESTIMONIALS SECTION ===
          - label: "⭐ Отзывы"
            name: "testimonials"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
                default: "Отзывы клиентов"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
                default: "Что говорят те, кто уже работает с AI-агентами"
              - label: "Карточки отзывов"
                name: "cards"
                widget: "list"
                summary: "{{fields.author}}"
                fields:
                  - label: "Имя"
                    name: "author"
                    widget: "string"
                    required: true
                  - label: "Профессия"
                    name: "role"
                    widget: "string"
                  - label: "Текст отзыва"
                    name: "text"
                    widget: "markdown"
                    required: true
                  - label: "Рейтинг (звёзды)"
                    name: "rating"
                    widget: "number"
                    default: 5
                    min: 1
                    max: 5
              - label: "Ссылка на бота отзывов"
                name: "bot_link"
                widget: "string"
                default: "https://t.me/otziyv_chatbota_kristina_bot"

          # === CONTACTS SECTION ===
          - label: "📞 Контакты"
            name: "contacts"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
                default: "Контакты"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
                default: "Свяжитесь со мной любым удобным способом"
              - label: "Telegram"
                name: "telegram"
                widget: "string"
                default: "@marketologdizayner"
              - label: "VK"
                name: "vk"
                widget: "string"
                default: "@kristinavcifre"
              - label: "Instagram"
                name: "instagram"
                widget: "string"
                default: "@gap_____ova_kristina"
              - label: "Режим работы"
                name: "hours"
                widget: "string"
                default: "Пн–Пт: 10:00–19:00 (МСК)"
              - label: "AI-статус"
                name: "ai_status"
                widget: "string"
                default: "AI-агенты работают 24/7 🤖"
              - label: "Финальная фраза"
                name: "final_text"
                widget: "markdown"
                default: "Если вы готовы выйти из операционки и построить бренд, который работает сам — пишите."

          # === APPLICATIONS SECTION ===
          - label: "🚀 Блок заявки"
            name: "applications"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
                default: "Оставить заявку"
              - label: "Описание"
                name: "description"
                widget: "markdown"
                default: "Общайтесь с AI-агентом Кристины — он соберёт заявку за вас"
              - label: "Название виджета"
                name: "widget_name"
                widget: "string"
                default: "AI-агент Кристины"
              - label: "Подпись виджета"
                name: "widget_subtitle"
                widget: "string"
                default: "Цифровой двойник"

          # === FOOTER ===
          - label: "🔻 Footer (Подвал)"
            name: "footer"
            widget: "object"
            collapsed: false
            fields:
              - label: "Логотип"
                name: "logo"
                widget: "string"
                default: "КРИСТИНА.AI"
              - label: "Telegram ссылка"
                name: "telegram_link"
                widget: "string"
                default: "https://t.me/marketologdizayner"
              - label: "VK ссылка"
                name: "vk_link"
                widget: "string"
                default: "https://vk.ru/kristinavcifre"
              - label: "Instagram ссылка"
                name: "instagram_link"
                widget: "string"
                default: "https://www.instagram.com/gap_____ova_kristina/"
              - label: "Копирайт"
                name: "copyright"
                widget: "string"
                default: "© 2025 КРИСТИНА.AI — Оазис будущего"

          # === CUSTOM CODE SECTIONS (как на Тильде) ===
          - label: "💻 Кастомный код (HTML/JS/CSS)"
            name: "custom_code"
            widget: "object"
            collapsed: true
            hint: "Вставляй сюда любые скрипты, стили или HTML-блоки. Как на Тильде."
            fields:
              - label: "Код в <head> (метатеги, стили, скрипты аналитики)"
                name: "head_code"
                widget: "code"
                default_language: "html"
                output_code_only: false
                hint: "Например: Яндекс.Метрика, Google Analytics, кастомные стили"
              - label: "Код перед </body> (скрипты, виджеты)"
                name: "footer_code"
                widget: "code"
                default_language: "javascript"
                output_code_only: false
                hint: "Например: чат-виджеты, пиксели, кастомные скрипты"
