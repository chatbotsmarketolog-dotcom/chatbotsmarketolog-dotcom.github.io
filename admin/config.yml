backend:
  name: git-gateway
  branch: main # Убедись, что твоя основная ветка называется main, а не master

media_folder: "images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Редактор сайта"
    files:
      - name: "index"
        label: "Главная страница (index.html)"
        file: "index.html"
        fields:
          - label: "Код страницы (будь внимательна при редактировании тегов)"
            name: "body"
            widget: "code"
            default_language: "html"
