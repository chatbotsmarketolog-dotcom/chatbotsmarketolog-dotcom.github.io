backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "site"
    label: "📄 Сайт КРИСТИНА.AI"
    editor:
      preview: false
    files:
      - name: "site-config"
        file: "content/site.json"
        label: "📄 Главная страница (Все тексты)"
        fields:
          # === SEO ===
          - label: "🔍 SEO настройки"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - label: "Title (заголовок вкладки)"
                name: "title"
                widget: "string"
                default: "AI-агенты и чат-боты для бизнеса | КРИСТИНА.AI — Автоматизация продаж"
              - label: "Description (описание для поисковиков)"
                name: "description"
                widget: "text"
                default: "Создание AI-агентов и чат-ботов под ключ. Автоматизация продаж в Telegram и VK. Техно-маркетолог Кристина. Бесплатная диагностика воронки."
              - label: "Keywords (ключевые слова)"
                name: "keywords"
                widget: "string"
                default: "AI-агент, чат-бот, автоматизация продаж, Telegram бот, VK бот, AI-маркетинг, воронка продаж, нейро-менеджер"
              - label: "Ссылка на OG Image (превью)"
                name: "og_image"
                widget: "string"
                default: "https://chatbotsmarketolog-dotcom.github.io/preview.jpg"

          # === HEADER ===
          - label: "🔝 Шапка сайта"
            name: "header"
            widget: "object"
            fields:
              - label: "Логотип (текст)"
                name: "logo"
                widget: "string"
                default: "КРИСТИНА.AI"
              - label: "Пункты меню"
                name: "menu"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - label: "Название"
                    name: "label"
                    widget: "string"
                  - label: "Ссылка (якорь или страница)"
                    name: "href"
                    widget: "string"

          # === HERO SECTION ===
          - label: "🎯 Главный экран (Hero)"
            name: "hero"
            widget: "object"
            fields:
              - label: "Надзаголовок (бейдж)"
                name: "eyebrow"
                widget: "string"
                default: "✦ ТЁПЛАЯ МАГИЯ ТЕХНОЛОГИЙ ✦"
              - label: "Заголовок H1"
                name: "title"
                widget: "string"
                default: "Ваш бренд будет работать самостоятельно"
              - label: "Описание"
                name: "description"
                widget: "text"
                default: "Создаю чат-ботов и AI-агентов, которые работают вместо вас 24/7, говорят вашим голосом и закрывают вопросы без вашего участия."
              - label: "Текст кнопки 1"
                name: "btn1_text"
                widget: "string"
                default: "Оставить заявку"
              - label: "Ссылка кнопки 1"
                name: "btn1_link"
                widget: "string"
                default: "#contact"
              - label: "Текст кнопки 2"
                name: "btn2_text"
                widget: "string"
                default: "Узнать больше"
              - label: "Ссылка кнопки 2"
                name: "btn2_link"
                widget: "string"
                default: "#services"
              - label: "Заголовок в мокапе телефона"
                name: "phone_title"
                widget: "string"
                default: "AI-Агент Кристины"
              - label: "Статус в мокапе телефона"
                name: "phone_status"
                widget: "string"
                default: "онлайн • отвечает мгновенно"

          # === PAIN SECTION ===
          - label: "😣 Проблемы (Pain)"
            name: "pain"
            widget: "object"
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
                default: "Узнаете себя?"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "string"
                default: "Эти проблемы знакомы большинству экспертов"
              - label: "Карточки проблем"
                name: "cards"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - label: "Иконка (эмодзи)"
                    name: "icon"
                    widget: "string"
                  - label: "Заголовок"
                    name: "title"
                    widget: "string"
                  - label: "Текст"
                    name: "text"
                    widget: "text"
              - label: "Вывод (заключение)"
                name: "conclusion"
                widget: "markdown"
                default: "Вам нужна **система, которая берёт рутину на себя**."

          # === STATS ===
          - label: "📊 Статистика"
            name: "stats"
            widget: "object"
            fields:
              - label: "Элементы статистики"
                name: "items"
                widget: "list"
                summary: "{{fields.number}} {{fields.label}}"
                fields:
                  - label: "Число"
                    name: "number"
                    widget: "string"
                  - label: "Подпись"
                    name: "label"
                    widget: "string"

          # === SERVICES ===
          - label: "💼 Услуги"
            name: "services"
            widget: "object"
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
                default: "VIP-решения для вашего бизнеса"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "string"
                default: "Каждая услуга — трансформация вашей системы"
              - label: "Список услуг"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - label: "Название услуги"
                    name: "title"
                    widget: "string"
                  - label: "Описание"
                    name: "description"
                    widget: "text"
                  - label: "Цена"
                    name: "price"
                    widget: "string"
                  - label: "Текст кнопки"
                    name: "btn_text"
                    widget: "string"
                  - label: "Выделить карточку (Highlight)"
                    name: "highlight"
                    widget: "boolean"
                    default: false

          # === REVIEWS ===
          - label: "⭐ Отзывы"
            name: "reviews"
            widget: "object"
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
                default: "Цифры и эмоции говорят громче слов"
              - label: "Список отзывов"
                name: "items"
                widget: "list"
                summary: "{{fields.author}}"
                fields:
                  - label: "Текст отзыва"
                    name: "text"
                    widget: "text"
                  - label: "Имя автора"
                    name: "author"
                    widget: "string"
                  - label: "Первая буква имени (для аватара)"
                    name: "initial"
                    widget: "string"
              - label: "Текст блока ссылки на отзыв"
                name: "link_text"
                widget: "string"
                default: "Оставьте отзыв в Google ⭐"
              - label: "Текст кнопки"
                name: "link_btn_text"
                widget: "string"
                default: "Написать отзыв"
              - label: "Ссылка на отзыв"
                name: "link_href"
                widget: "string"
                default: "https://g.page/r/CY8vfg7bKgMSEBI/review"

          # === CONTACT ===
          - label: "📬 Контакты и форма"
            name: "contact"
            widget: "object"
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
                default: "Свяжитесь со мной"
              - label: "Способы связи"
                name: "methods"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - label: "Иконка (эмодзи)"
                    name: "icon"
                    widget: "string"
                  - label: "Название"
                    name: "title"
                    widget: "string"
                  - label: "Значение (никнейм)"
                    name: "value"
                    widget: "string"
                  - label: "Ссылка"
                    name: "href"
                    widget: "string"
              - label: "Плейсхолдер: Имя"
                name: "ph_name"
                widget: "string"
                default: "Ваше имя"
              - label: "Плейсхолдер: Контакт"
                name: "ph_contact"
                widget: "string"
                default: "Telegram или VK"
              - label: "Плейсхолдер: Задача"
                name: "ph_task"
                widget: "string"
                default: "Кратко опишите задачу"
              - label: "Текст кнопки ВК"
                name: "btn_vk"
                widget: "string"
                default: "Заявка для ВК"
              - label: "Текст кнопки Telegram"
                name: "btn_tg"
                widget: "string"
                default: "Заявка в Telegram"

          # === ABOUT ===
          - label: "👩‍💻 Обо мне"
            name: "about"
            widget: "object"
            fields:
              - label: "Заголовок (поддерживает HTML для цвета)"
                name: "title_html"
                widget: "markdown"
                default: "Техно-маркетолог <span style=\"background:linear-gradient(135deg, var(--gold-primary), var(--gold-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;\">и коуч по страхам в продажах</span>"
              - label: "Текст 1"
                name: "text1"
                widget: "text"
                default: "Система без смелости — мёртвая архитектура. Смелость без системы — выгорание. Я работаю с обоими."
              - label: "Текст 2 (список, поддерживает HTML)"
                name: "text2_html"
                widget: "markdown"
                default: "**🔹 Диагностика** — аудит воронки, сайта, чат-бота → пошаговый план.<br>**🔹 Коучинг** — проработка страхов за 2–5 сессий.<br>**🔹 Под ключ** — техника + внутренняя свобода."

          # === FAQ ===
          - label: "❓ FAQ (Вопросы и ответы)"
            name: "faq"
            widget: "object"
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
                default: "Прозрачные условия сотрудничества"
              - label: "Вопросы и ответы"
                name: "items"
                widget: "list"
                summary: "{{fields.question}}"
                fields:
                  - label: "Вопрос"
                    name: "question"
                    widget: "string"
                  - label: "Ответ (поддерживает HTML и <strong>)"
                    name: "answer_html"
                    widget: "markdown"

          # === FOOTER ===
          - label: "🔻 Подвал (Footer)"
            name: "footer"
            widget: "object"
            fields:
              - label: "Логотип"
                name: "logo"
                widget: "string"
                default: "КРИСТИНА.AI"
              - label: "Ссылки в подвале"
                name: "links"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - label: "Название"
                    name: "label"
                    widget: "string"
                  - label: "Ссылка"
                    name: "href"
                    widget: "string"
              - label: "Текст копирайта"
                name: "copyright"
                widget: "string"
                default: "© 2026 КРИСТИНА.AI — Оазис будущего. Все права защищены."

          # === PRIVACY MODAL ===
          - label: "🔒 Политика конфиденциальности (Модальное окно)"
            name: "privacy"
            widget: "object"
            collapsed: true
            fields:
              - label: "Дата публикации"
                name: "date"
                widget: "string"
                default: "01.05.2026"
              - label: "Содержимое (HTML)"
                name: "content_html"
                widget: "markdown"
                default: "<h3>1. Общие положения</h3><p>Настоящая Политика определяет порядок обработки и защиты персональных данных пользователей сайта КРИСТИНА.AI.</p><h3>2. Какие данные мы собираем</h3><p>Контактные данные (имя, Telegram/VK username), описание задачи, выбранная услуга, технические данные.</p><h3>3. Цели обработки</h3><p>Обработка заявок, связь с вами, улучшение сервиса, исполнение договоров.</p><h3>4. Хранение и защита</h3><p>Данные защищены и не передаются третьим лицам.</p><h3>5. Условия оплаты и возврата</h3><p>Все услуги предоставляются на условиях <strong>100% предоплаты</strong>. При заключении договора фиксируются услуга, стоимость, обязанности сторон и условия возврата. Возврат 50% возможен исключительно в случаях, предусмотренных договором.</p><h3>6. Права пользователя</h3><p>Вы можете запросить, исправить или удалить свои данные.</p><h3>7. Контакты</h3><p>По вопросам: <a href=\"https://t.me/marketologdizayner\" target=\"_blank\">@marketologdizayner</a></p>"
