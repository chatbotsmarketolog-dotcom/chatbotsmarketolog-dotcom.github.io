backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "site"
    label: "📄 Сайт КРИСТИНА.AI"
    editor:
      preview: false
    files:
      - name: "site-config"
        file: "content/site.json"
        label: "📄 Главная страница (Все тексты)"
        fields:
          - label: "🔍 SEO настройки"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"
              - label: "Keywords"
                name: "keywords"
                widget: "string"
              - label: "OG Image URL"
                name: "og_image"
                widget: "string"

          - label: "🔝 Шапка сайта"
            name: "header"
            widget: "object"
            fields:
              - label: "Логотип"
                name: "logo"
                widget: "string"
              - label: "Пункты меню"
                name: "menu"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - label: "Название"
                    name: "label"
                    widget: "string"
                  - label: "Ссылка"
                    name: "href"
                    widget: "string"

          - label: "🎯 Главный экран (Hero)"
            name: "hero"
            widget: "object"
            fields:
              - label: "Надзаголовок (бейдж)"
                name: "eyebrow"
                widget: "string"
              - label: "Заголовок H1"
                name: "title"
                widget: "string"
              - label: "Описание"
                name: "description"
                widget: "text"
              - label: "Текст кнопки 1"
                name: "btn1_text"
                widget: "string"
              - label: "Ссылка кнопки 1"
                name: "btn1_link"
                widget: "string"
              - label: "Текст кнопки 2"
                name: "btn2_text"
                widget: "string"
              - label: "Ссылка кнопки 2"
                name: "btn2_link"
                widget: "string"
              - label: "Заголовок в мокапе телефона"
                name: "phone_title"
                widget: "string"
              - label: "Статус в мокапе"
                name: "phone_status"
                widget: "string"

          - label: "😣 Проблемы (Pain)"
            name: "pain"
            widget: "object"
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "string"
              - label: "Карточки проблем"
                name: "cards"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - label: "Иконка"
                    name: "icon"
                    widget: "string"
                  - label: "Заголовок"
                    name: "title"
                    widget: "string"
                  - label: "Текст"
                    name: "text"
                    widget: "text"
              - label: "Вывод (заключение)"
                name: "conclusion"
                widget: "markdown"

          - label: "📊 Статистика"
            name: "stats"
            widget: "object"
            fields:
              - label: "Элементы статистики"
                name: "items"
                widget: "list"
                summary: "{{fields.number}} {{fields.label}}"
                fields:
                  - label: "Число"
                    name: "number"
                    widget: "string"
                  - label: "Подпись"
                    name: "label"
                    widget: "string"

          - label: "💼 Услуги"
            name: "services"
            widget: "object"
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "string"
              - label: "Список услуг"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - label: "Название услуги"
                    name: "title"
                    widget: "string"
                  - label: "Описание"
                    name: "description"
                    widget: "text"
                  - label: "Цена"
                    name: "price"
                    widget: "string"
                  - label: "Доп. информация (например, рассрочка)"
                    name: "note"
                    widget: "string"
                    required: false
                  - label: "Текст кнопки"
                    name: "btn_text"
                    widget: "string"
                  - label: "Выделить карточку (Highlight)"
                    name: "highlight"
                    widget: "boolean"
                    default: false

          - label: "⭐ Отзывы"
            name: "reviews"
            widget: "object"
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
              - label: "Список отзывов"
                name: "items"
                widget: "list"
                summary: "{{fields.author}}"
                fields:
                  - label: "Текст отзыва"
                    name: "text"
                    widget: "text"
                  - label: "Имя автора"
                    name: "author"
                    widget: "string"
                  - label: "Первая буква (для аватара)"
                    name: "initial"
                    widget: "string"
              - label: "Текст блока ссылки на отзыв"
                name: "link_text"
                widget: "string"
              - label: "Текст кнопки"
                name: "link_btn_text"
                widget: "string"
              - label: "Ссылка на отзыв"
                name: "link_href"
                widget: "string"

          - label: "📬 Контакты и форма"
            name: "contact"
            widget: "object"
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
              - label: "Способы связи"
                name: "methods"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - label: "Иконка"
                    name: "icon"
                    widget: "string"
                  - label: "Название"
                    name: "title"
                    widget: "string"
                  - label: "Значение"
                    name: "value"
                    widget: "string"
                  - label: "Ссылка"
                    name: "href"
                    widget: "string"
              - label: "Плейсхолдер: Имя"
                name: "ph_name"
                widget: "string"
              - label: "Плейсхолдер: Контакт"
                name: "ph_contact"
                widget: "string"
              - label: "Плейсхолдер: Задача"
                name: "ph_task"
                widget: "string"
              - label: "Текст кнопки ВК"
                name: "btn_vk"
                widget: "string"
              - label: "Текст кнопки Telegram"
                name: "btn_tg"
                widget: "string"

          - label: "👩‍💻 Обо мне"
            name: "about"
            widget: "object"
            fields:
              - label: "Заголовок (поддерживает HTML)"
                name: "title_html"
                widget: "markdown"
              - label: "Текст 1"
                name: "text1"
                widget: "text"
              - label: "Текст 2 (список, поддерживает HTML)"
                name: "text2_html"
                widget: "markdown"

          - label: "❓ FAQ"
            name: "faq"
            widget: "object"
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
              - label: "Вопросы и ответы"
                name: "items"
                widget: "list"
                summary: "{{fields.question}}"
                fields:
                  - label: "Вопрос"
                    name: "question"
                    widget: "string"
                  - label: "Ответ (поддерживает HTML)"
                    name: "answer_html"
                    widget: "markdown"

          - label: "🔻 Подвал (Footer)"
            name: "footer"
            widget: "object"
            fields:
              - label: "Логотип"
                name: "logo"
                widget: "string"
              - label: "Ссылки в подвале"
                name: "links"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - label: "Название"
                    name: "label"
                    widget: "string"
                  - label: "Ссылка"
                    name: "href"
                    widget: "string"
              - label: "Текст копирайта"
                name: "copyright"
                widget: "string"

          - label: "🔒 Политика конфиденциальности"
            name: "privacy"
            widget: "object"
            collapsed: true
            fields:
              - label: "Дата публикации"
                name: "date"
                widget: "string"
              - label: "Содержимое (HTML)"
                name: "content_html"
                widget: "markdown"
