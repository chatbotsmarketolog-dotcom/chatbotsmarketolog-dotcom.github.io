<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КРИСТИНА.AI — Админ-панель</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e17 0%, #1a2332 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loading {
      color: #00F0FF;
      font-size: 1.5rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="loading">Загрузка админ-панели...</div>
  
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    // Инициализация Decap CMS с GitHub OAuth
    CMS.init({
      backend: {
        name: 'github',
        repo: 'chatbotsmarketolog-dotcom/Chatbot-and-AI-Agent-Studio',
        branch: 'main',
        auth_scope: 'repo',
        open_authoring: false
      },
      load_config_file: true,
      config_path: 'admin/config.yml'
    });
  </script>
</body>
</html>
